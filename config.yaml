# ============================================================
# BOM-Taobao-Filler 配置文件
# ============================================================

# 淘宝搜索参数
search_pages: 5               # 搜索页数（1-5）
strategy: "B"                  # 匹配策略: "A"=价格优先, "B"=综合评分
min_price: 0.01                # 最低有效价格（低于此值视为刷单/废品链接）

# 黑名单关键词（标题中含这些词的商品将被过滤）
blacklist:
  - "样品"
  - "测试"
  - "开发板"
  - "拆机"
  - "二手"

# 超时设置（秒）
timeout: 30

# 缓存有效期（小时），24小时内重复搜索直接读缓存
cache_ttl_hours: 24

# 日志级别: DEBUG / INFO / WARNING / ERROR
log_level: "INFO"